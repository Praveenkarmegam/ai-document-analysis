<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    
    <div class="container glass">
        <header>
            <h1>AI Document Analyzer</h1>
            <p>Upload a PDF, DOCX, or Image to extract insights, entities, and sentiment.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone glass">
                <div class="upload-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p>Drag & Drop your file here</p>
                    <span>or</span>
                    <label for="file-upload" class="upload-btn">Browse Files</label>
                    <input type="file" id="file-upload" accept=".pdf,.docx,.jpg,.jpeg,.png">
                </div>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Munching through documents using AI...</p>
            </div>

            <div id="results" class="results-container hidden">
                <div class="result-card summary-card glass">
                    <h3>Summary</h3>
                    <p id="summary-text"></p>
                </div>

                <div class="result-card sentiment-card glass">
                    <h3>Sentiment</h3>
                    <div id="sentiment-badge" class="badge"></div>
                </div>

                <div class="result-card entities-card glass">
                    <h3>Key Entities</h3>
                    <div class="entity-groups">
                        <div class="entity-group">
                            <h4>Names</h4>
                            <div id="entities-names" class="tags"></div>
                        </div>
                        <div class="entity-group">
                            <h4>Organizations</h4>
                            <div id="entities-orgs" class="tags"></div>
                        </div>
                        <div class="entity-group">
                            <h4>Dates</h4>
                            <div id="entities-dates" class="tags"></div>
                        </div>
                        <div class="entity-group">
                            <h4>Amounts</h4>
                            <div id="entities-amounts" class="tags"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="hidden error-card glass">
                <p id="error-text">An error occurred.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
